<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="content=ie=edge">
    <title>陳老師課程公告網</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="wrap">
        <div class="container-fluid padding-tb">
            <div class="row">
                <div class="col-8">
                    <h1>課程訊息公告網</h1>
                </div>
                <div class="col-4">
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLScsF-WyglqPyw9yXwF-RZ3LZaGDbBwAV9DCtQwAXs8oSEmSpQ/viewform?usp=header" class="btn btn-danger float-right" target="_blank">登錄公告事項</a>
                </div>
                
                <div class="col-12 mb-3">
                    <div class="group">
                        <label>班級查詢</label>
                        <select id="select">
                            <option value="" checked>All</option>
                            <option value="貿一慈">貿一慈</option>
                            <option value="英一德">英一德</option>
                            <option value="英一慧">英一慧</option>
                            <option value="普一明">普一明</option>
                            <option value="普一禮">普一禮</option>
                            <option value="普一廉">普一廉</option>
                            <option value="程式演算法">基礎程式演算法</option>
                            <option value="程式進階">程式進階</option>
                        </select>
                        <input type="submit" id="doaction" class="btn btn-primary ml-3" value="查詢">
                    </div>
                </div>

                <div class="col-12">
                    <div class="table-responsive-md">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th scope="col" class="w-15">公告日期</th>
                                    <th scope="col" class="w-10">班級名稱</th>
                                    <th scope="col" class="w-10">公告人</th>
                                    <th scope="col" class="w-15">作業類型</th>
                                    <th scope="col" class="w-10">截止日期</th>
                                    <th scope="col" class="w-15">開始時間</th>
                                    <th scope="col" class="w-15">結束時間</th>
                                    <th scope="col" class="w-10">公告內容說明</th>
                                </tr>
                            </thead>
                            <tbody id="table-data">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div> </div> </div> <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
